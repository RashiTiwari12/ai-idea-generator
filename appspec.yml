version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/ai-idea-generator
hooks:
  BeforeInstall:
    - location: scripts/clean_old.sh
      timeout: 300
      runas: ec2-user
  AfterInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: ec2-user

